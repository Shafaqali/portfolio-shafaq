<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#0d0d18"/>
  <rect x="16" y="16" width="480" height="480" rx="88" fill="#161624"/>
  <!-- Grid pattern -->
  <line x1="0" y1="128" x2="512" y2="128" stroke="rgba(255,255,255,0.035)" stroke-width="1.5"/>
  <line x1="0" y1="256" x2="512" y2="256" stroke="rgba(255,255,255,0.035)" stroke-width="1.5"/>
  <line x1="0" y1="384" x2="512" y2="384" stroke="rgba(255,255,255,0.035)" stroke-width="1.5"/>
  <line x1="128" y1="0" x2="128" y2="512" stroke="rgba(255,255,255,0.035)" stroke-width="1.5"/>
  <line x1="256" y1="0" x2="256" y2="512" stroke="rgba(255,255,255,0.035)" stroke-width="1.5"/>
  <line x1="384" y1="0" x2="384" y2="512" stroke="rgba(255,255,255,0.035)" stroke-width="1.5"/>
  <!-- Glow -->
  <circle cx="256" cy="240" r="160" fill="url(#glow)" opacity="0.15"/>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- SA letters -->
  <text x="256" y="310" font-family="Georgia,serif" font-weight="800" font-size="190" fill="#eeeef5" text-anchor="middle" letter-spacing="-10">SA</text>
  <!-- Accent dot -->
  <circle cx="368" cy="182" r="26" fill="#c084fc"/>
  <!-- Bottom accent bar -->
  <rect x="106" y="394" width="300" height="10" rx="5" fill="#c084fc" opacity="0.55"/>
</svg>
